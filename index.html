  <body>
    <a class="skip-link" href="#main">Skip to content</a>
    <main id="main">
      <h1 class="visually-hidden" id="hero-title">NatsuFox signal board</h1>
      <section class="hero hero-circuit" aria-labelledby="hero-title">
        <div class="hero-circuit-frame">
          <div class="hero-board" data-circuit-board aria-label="Animated frosted-glass circuit board with glyph traces and dynamic modules">
              <div class="hero-board-surface">
                <span class="board-halo board-halo--north" aria-hidden="true"></span>
                <span class="board-halo board-halo--east" aria-hidden="true"></span>
                <span class="board-halo board-halo--south" aria-hidden="true"></span>
                <canvas class="board-canvas" data-board-canvas aria-hidden="true"></canvas>

                <div class="avatar-chip cpu-chip" data-avatar-chip>
                  <span class="chip-pins chip-pins--top" aria-hidden="true"></span>
                  <span class="chip-pins chip-pins--right" aria-hidden="true"></span>
                  <span class="chip-pins chip-pins--bottom" aria-hidden="true"></span>
                  <span class="chip-pins chip-pins--left" aria-hidden="true"></span>
                  <div class="avatar-chip-shell cpu-chip-shell">
                    <div class="avatar-chip-core cpu-chip-core">
                      <span class="avatar-chip-media cpu-chip-media" aria-hidden="true">NF</span>
                      <span class="avatar-chip-copy cpu-chip-copy">
                        <strong>NatsuFox</strong>
                        <small>Root-domain signal processor</small>
                      </span>
                    </div>
                  </div>
                </div>

                <article class="info-block" data-info-block data-art="fox-glyph" data-size="md">
                  <span class="info-block-label">identity glyph</span>
                  <span class="info-block-noise" aria-hidden="true">#<>/01</span>
                  <span class="info-block-art"></span>
                </article>
                <article class="info-block" data-info-block data-art="ascii-bloom" data-size="sm">
                  <span class="info-block-label">ascii bloom</span>
                  <span class="info-block-noise" aria-hidden="true">0xA3::</span>
                  <span class="info-block-art"></span>
                </article>
                <article class="info-block" data-info-block data-art="constellation" data-size="md">
                  <span class="info-block-label">signal map</span>
                  <span class="info-block-noise" aria-hidden="true">[]{}//</span>
                  <span class="info-block-art"></span>
                </article>
                <article class="info-block" data-info-block data-art="wave-garden" data-size="md">
                  <span class="info-block-label">wave garden</span>
                  <span class="info-block-noise" aria-hidden="true">@>@>@</span>
                  <span class="info-block-art"></span>
                </article>
                <article class="info-block" data-info-block data-art="memory-knot" data-size="sm">
                  <span class="info-block-label">memory knot</span>
                  <span class="info-block-noise" aria-hidden="true">%+?%+</span>
                  <span class="info-block-art"></span>
                </article>
                <article class="info-block" data-info-block data-art="pulse-poem" data-size="md">
                  <span class="info-block-label">pulse poem</span>
                  <span class="info-block-noise" aria-hidden="true">==::==</span>
                  <span class="info-block-art"></span>
                </article>
                <article class="info-block" data-info-block data-art="fox-glyph" data-size="sm">
                  <span class="info-block-label">chip fox</span>
                  <span class="info-block-noise" aria-hidden="true">//11//</span>
                  <span class="info-block-art"></span>
                </article>
                <article class="info-block" data-info-block data-art="constellation" data-size="lg">
                  <span class="info-block-label">node field</span>
                  <span class="info-block-noise" aria-hidden="true">%:[]:%</span>
                  <span class="info-block-art"></span>
                </article>
                <article class="info-block" data-info-block data-art="wave-garden" data-size="sm">
                  <span class="info-block-label">carrier wave</span>
                  <span class="info-block-noise" aria-hidden="true">><><><</span>
                  <span class="info-block-art"></span>
                </article>
                <article class="info-block" data-info-block data-art="memory-knot" data-size="md">
                  <span class="info-block-label">cache braid</span>
                  <span class="info-block-noise" aria-hidden="true">00::00</span>
                  <span class="info-block-art"></span>
                </article>
              </div>
            </div>
          </div>
      </section>
    </main>
  </body>
</html>
